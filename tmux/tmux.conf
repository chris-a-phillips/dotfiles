
# Set terminal colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Set prefix to Ctrl + Space
unbind C-b
unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix

# Split panes using | and - at the current path
unbind '"'
unbind '%'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window index settings
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Navigation between windows
bind -n C-o previous-window
bind -n C-p next-window

# Move the current window and keep focus on it
bind o swap-window -t :-1 \; select-window -t :-1
bind p swap-window -t :+1 \; select-window -t :+1

# Quick window switching by index (1-9)
bind -T root C-Space switch-client -T window-index
bind -T window-index 1 select-window -t :1
bind -T window-index 2 select-window -t :2
bind -T window-index 3 select-window -t :3
bind -T window-index 4 select-window -t :4
bind -T window-index 5 select-window -t :5
bind -T window-index 6 select-window -t :6
bind -T window-index 7 select-window -t :7
bind -T window-index 8 select-window -t :8
bind -T window-index 9 select-window -t :9

# Close window with Shift+X (requires prefix) - with confirmation
bind X confirm-before -p "kill-window #W? (y/n)" "kill-window"
# Kill pane with lowercase x - with confirmation
bind x confirm-before -p "kill-pane #P? (y/n)" "kill-pane"
# Direct Shift+X binding (some terminals) - with confirmation
bind -n S-X confirm-before -p "kill-window #W? (y/n)" "kill-window"

# Reload tmux configuration
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Vim-like pane switching
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Copy Mode (Vim-style)
setw -g mode-keys vi
set -g @clipboard_program "xclip -selection clipboard -i"
set -g set-clipboard off
bind -n C-v copy-mode \; display-message "Entered copy mode (Normal)"
bind -T copy-mode-vi v send-keys -X begin-selection \; display-message "Entered visual mode"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
bind -T copy-mode-vi j {
  send-keys -X cursor-down
  send-keys -X scroll-middle
}
bind -T copy-mode-vi k {
  send-keys -X cursor-up
  send-keys -X scroll-middle
}
bind -T copy-mode-vi C-d {
  send-keys -X halfpage-down
  send-keys -X scroll-middle
}
bind -T copy-mode-vi C-u {
  send-keys -X halfpage-up
  send-keys -X scroll-middle
}
bind -T copy-mode-vi w send-keys -X next-word
bind -T copy-mode-vi b send-keys -X previous-word

# Remove conflicting Ctrl + r bindings
unbind -T copy-mode-vi C-r
unbind -T copy-mode C-r
unbind -n C-r

# Bind Ctrl + r for direct reverse-i-search in the shell
bind-key -n C-r send-keys C-r

# Open new windows to the right at the current pane path
bind-key c new-window -a -c "#{pane_current_path}"

# Quick open notes
bind-key h split-window -h -c "#{pane_current_path}" "nvim ~/scratch/notes.md"

######################
### DESIGN CHANGES ###
######################

# Status bar settings
set-option -g status-justify "left"
set-option -g status-fg cyan
set-option -g status-bg black

# Window and pane styles
set -g pane-active-border-style fg=colour214,bg=default,bold
set -g window-style fg=colour10,bg=default
set -g window-active-style fg=colour12,bg=default
set-option -g history-limit 64096

# Escape time (improves responsiveness for keybindings)
set -sg escape-time 10

#### COLOUR SETTINGS ####
# Status bar
set-option -g status-style bg=colour235,fg=colour136,default
# Window title colors
set-window-option -g window-status-style fg=colour244,bg=colour234,dim
set-window-option -g window-status-current-style fg=colour166,bg=default,bright
# Pane border
set-option -g pane-border-lines heavy
set-option -g pane-border-style fg=colour235,bg=default
set-option -g pane-active-border-style fg=colour214,bg=default,bold
# Message text
set-option -g message-style bg=colour235,fg=colour166
# Pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange
# Clock color
set-window-option -g clock-mode-colour colour64 #green

# enable-mouse on
set -g mouse on
bind -T root MouseDown2Pane select-pane -t=

# Adaptive title bar
set -g set-titles on
set -g set-titles-string "#T"

## Import external configs
source ~/.config/tmux/statusline.conf
source ~/.config/tmux/utility.conf
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"
if-shell "grep -qiE '(microsoft|wsl)' /proc/version 2>/dev/null" "source ~/.config/tmux/wsl.conf"

######################
####### PLUGINS ######
######################

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'

# Utilities
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @sidebar-tree-command 'tree -C'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-urlview'

# Persist tmux sessions, windows, panes, layouts, and working directories.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'

# Autosave and restore the last tmux environment when a new tmux server starts.
# Continuum saves every 15 minutes by default and should stay last in the plugin list.
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (Keep this at the bottom)
run '~/.tmux/plugins/tpm/tpm'

# Keep Resurrect installed, but remove manual save/restore bindings while the
# workflow is autosave-first.
unbind-key C-s
unbind-key C-r

# Final copy-mode overrides. Keep these after plugins so copy-mode behaves like
# a Vim-style normal/visual mode until Escape explicitly exits.
bind -T copy-mode-vi y send-keys -X copy-pipe "#{@clipboard_program}" \; send-keys -X clear-selection \; display-message "Yanked to clipboard"
bind -T copy-mode-vi Y send-keys -X select-line \; send-keys -X copy-pipe "#{@clipboard_program}" \; send-keys -X clear-selection \; display-message "Yanked line to clipboard"
bind -T copy-mode-vi Enter send-keys -X copy-pipe "#{@clipboard_program}" \; send-keys -X clear-selection \; display-message "Yanked to clipboard"
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q display-message "Press Escape to leave copy mode"
bind -T copy-mode-vi C-c display-message "Press Escape to leave copy mode"
bind -T copy-mode-vi A display-message "Press y to yank, Escape to leave copy mode"
bind -T copy-mode-vi D display-message "Press y to yank, Escape to leave copy mode"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe "#{@clipboard_program}" \; send-keys -X clear-selection
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe "#{@clipboard_program}" \; send-keys -X clear-selection
